<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Documentation - Blocks Master & SiteMaster</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="Documentation complete du plugin Blocks Master">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    
    <!-- Theme Docsify (Vue est tres clair et propre) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
    
    <style>
        :root {
            --theme-color: #4f46e5;
            --docsifytabs-border-color: #ededed;
        }

        html, body {
            overflow-x: hidden !important;
            width: 100%;
            position: relative;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
        }

        *, *::before, *::after {
            box-sizing: border-box !important;
        }

        main {
            width: 100%;    
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            
        }

        /* Personnalisation propre du bouton copie */
        .docsify-copy-code-button {
            background-color: var(--theme-color) !important;
            color: #fff !important;
            border-radius: 4px !important;
        }

        /* === CORRECTIONS MOBILE & STRUCTURE === */
        
        /* Enleve la limitation absurde de 80% sur les petits et moyens ecrans */
        .markdown-section {
            max-width: 900px !important;
            margin: 0 auto;
        }

        /* Tablettes & Mobiles */
        @media screen and (max-width: 768px) {
            .markdown-section {
                max-width: 100% !important; /* Pleine largeur */
                padding: 30px 15px !important; /* Marges confortables */
            }

            /* Empeche les grands titres ou les blocks (comme CAUTION dans l'API) de depasser */
            .markdown-section h1, 
            .markdown-section h2, 
            .markdown-section h3, 
            .markdown-section blockquote {
                word-wrap: break-word;
                overflow-wrap: break-word;
                width: 100%;
                box-sizing: border-box !important;
            }

            /* S'assure que le menu ne force pas de largeur etrange */
            body {
                overflow-x: hidden;
            }
        }
    </style>
</head>
<body>
    <div id="app">Chargement de la documentation...</div>
    <script>
        window.$docsify = {
            name: 'Blocks Master / SiteMaster',
            repo: '',
            loadSidebar: true,
            subMaxLevel: 3,
            auto2top: true,
            relativePath: true,
            copyCode: {
                buttonText: 'Copier',
                errorText: 'Erreur',
                successText: 'Copie'
            }
        }
    </script>
    
    <!-- Moteur Docsify -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
    
    <!-- Plugin : Copier le code (Copy to Clipboard) -->
    <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
    
    <!-- Plugins : Coloration syntaxique -->
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-php.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markup-templating.min.js"></script>
</body>
</html>
